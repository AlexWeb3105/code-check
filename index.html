<!DOCTYPE html>
<html class="page" lang="ru">

	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link rel="shortcut icon" href="./icon/favicon-nike-icon.svg" type="image/x-icon">
		<link rel="stylesheet" href="./css/index.css">
		<title>Nike Air mag</title>
	</head>

	<body class="page__body">
		<header class="header">
			<div class="container header__container">
				<svg>
					<use href="./icon/sprite.svg#logo" />
				</svg>
				<div class="logo header__logo">
				</div>
				<nav class="menu header__menu">
					<!--Из урока название, было class="nav"-->
					<ul class="menu__list">
						<li class="menu__item">
							<a href="#" class="menu__link" lang="en">Air Mag</a>
							<!-- lang="en" что бы скрин-ридер увидел, что тут англ слова-->
						</li>
						<li class="menu__item">
							<a href="#" class="menu__link">Размеры</a>
						</li>
						<li class="menu__item">
							<a href="#" class="menu__link">Характеристики</a>
						</li>
						<li class="menu__item">
							<a href="#" class="menu__link">Другие ТОП модели</a>
						</li>
					</ul>
				</nav>
				<div class="header__controls">
					<a class="header__order" href="#">
						Сделать заказ
					</a>
					<div class="heder__actions">
						<button class="heder__actions-button">
							<svg class="action__icon-search" width="24" height="24">
								<use class="heder__actions-icon" href="./icon/sprite.svg#search-header" />
							</svg>
						</button>
						<button class="heder__actions-button">
							<svg class="action__icon-shop" width="24" height="24">
								<use class="heder__actions-icon" href="./icon/sprite.svg#shopping-cart" />
